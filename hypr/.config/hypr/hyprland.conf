#
# Simplified Hyprland Configuration (Stow-ready)
# -----------------------------------------------------

# -----------------------------------------------------
# Monitors
# -----------------------------------------------------
# Base fallback to ensure laptop is on if the handler hasn't started yet
monitor=eDP-1,preferred,auto,1
monitor=,preferred,auto,1

# -----------------------------------------------------

# -----------------------------------------------------
# Environment Variables
# -----------------------------------------------------
env = XDG_CURRENT_DESKTOP,Hyprland
env = XDG_SESSION_TYPE,wayland
env = XDG_SESSION_DESKTOP,Hyprland
env = QT_QPA_PLATFORM,wayland;xcb
env = QT_QPA_PLATFORMTHEME,qt6ct
env = QT_WAYLAND_DISABLE_WINDOWDECORATION,1
env = QT_AUTO_SCREEN_SCALE_FACTOR,1
env = GDK_SCALE,1
env = GDK_BACKEND,wayland,x11,*
env = CLUTTER_BACKEND,wayland
env = MOZ_ENABLE_WAYLAND,1
env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Bibata-Modern-Amber
env = OZONE_PLATFORM,wayland
env = ELECTRON_OZONE_PLATFORM_HINT,wayland
env = SDL_VIDEODRIVER,wayland
env = XAUTHORITY,$HOME/.Xauthority

# -----------------------------------------------------
# Colors
# -----------------------------------------------------
source = ~/.local/share/matugen/hyprland-colors.conf
$color8 = $on_primary_fixed
$color11 = $on_surface

# -----------------------------------------------------
# Autostart
# -----------------------------------------------------
exec-once = dbus-update-activation-environment --systemd WAYLAND_DISPLAY XDG_CURRENT_DESKTOP=hyprland XCURSOR_THEME XCURSOR_SIZE
exec-once = gsettings set org.gnome.desktop.interface cursor-theme 'Bibata-Modern-Amber'
exec-once = gsettings set org.gnome.desktop.interface cursor-size 36
exec-once = /usr/lib/polkit-gnome/polkit-gnome-authentication-agent-1
exec-once = swaync
exec-once = hyprpaper
exec-once = hypridle
exec-once = wl-paste --watch cliphist store
exec-once = ~/.config/waybar/launch.sh # Launches your customized Waybar
exec-once = ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/wallpaper.py fetch
exec-once = python /home/jamesr/.local/bin/custom/hypr_monitor_auto.py
exec-once = hyprctl setcursor Bibata-Modern-Amber 36

# Workspace Assignments
exec-once = [workspace 1 silent] ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/specific_code_project.py ~/code/ember-data-processing
exec-once = [workspace 2 silent] google-chrome-stable
exec-once = [workspace 3 silent] slack
exec-once = [workspace 7 silent] pear-desktop
exec-once = [workspace 9 silent] zen-browser

# -----------------------------------------------------
# Input
# -----------------------------------------------------
input {
    kb_layout = gb
    numlock_by_default = true
    follow_mouse = 1
    mouse_refocus = false
    sensitivity = 0
    touchpad {
        natural_scroll = yes
        scroll_factor = 1.0
    }
}

# -----------------------------------------------------
# General
# -----------------------------------------------------
general {
    gaps_in = 10
    gaps_out = 14
    border_size = 3
    col.active_border = $color11
    col.inactive_border = $color8
    layout = dwindle
    resize_on_border = true
}

# -----------------------------------------------------
# Decoration
# -----------------------------------------------------
decoration {
    rounding = 10
    active_opacity = 1.0
    inactive_opacity = 0.9
    fullscreen_opacity = 1.0

    # blur {
    #     enabled = true
    #     size = 6
    #     passes = 2
    #     new_optimizations = on
    #     ignore_opacity = true
    #     xray = true
    # }

    shadow {
        enabled = true
        range = 30
        render_power = 3
        color = 0x66000000
    }
}

# -----------------------------------------------------
# Animations
# -----------------------------------------------------
animations {
    enabled = true
    bezier = md3_decel, 0.05, 0.7, 0.1, 1
    bezier = md3_accel, 0.3, 0, 0.8, 0.15
    bezier = menu_decel, 0.1, 1, 0, 1
    bezier = menu_accel, 0.38, 0.04, 1, 0.07

    animation = windows, 1, 3, md3_decel, popin 60%
    animation = windowsIn, 1, 3, md3_decel, popin 60%
    animation = windowsOut, 1, 3, md3_accel, popin 60%
    animation = border, 1, 10, default
    animation = fade, 1, 3, md3_decel
    animation = layersIn, 1, 3, menu_decel, slide
    animation = layersOut, 1, 1.6, menu_accel
    animation = workspaces, 1, 7, menu_decel, slide
}

# -----------------------------------------------------
# Layouts
# -----------------------------------------------------
dwindle {
    pseudotile = true
    preserve_split = true
}

misc {
    disable_hyprland_logo = true
    disable_splash_rendering = true
    initial_workspace_tracking = 1
}

binds {
    workspace_back_and_forth = false
    allow_workspace_cycles = true
}

# -----------------------------------------------------
# Window Rules
# -----------------------------------------------------
windowrule = match:title ^(pavucontrol)$, float on
windowrule = match:title ^(blueman-manager)$, float on
windowrule = match:title ^(nm-connection-editor)$, float on
windowrule = match:title ^(qalculate-gtk)$, float on
windowrule = match:title ^(Picture-in-Picture)$, float on, pin on, move 69.5% 4%
windowrule = match:class (.*waypaper.*), float on, size 900 700, center on
windowrule = match:class .*, focus_on_activate on

# Zoom: Disable animations, shadows and floating for toolbars
windowrule = match:class ^(zoom)$, no_anim on
windowrule = match:class ^(zoom)$, no_shadow on
windowrule = match:class ^(zoom)$, float on
windowrule = match:title ^(zoom)$, float on
windowrule = match:title ^(as_toolbar)$, float on

# -----------------------------------------------------
# Keybindings
# -----------------------------------------------------
$mainMod = SUPER

# Core Applications
bind = $mainMod, RETURN, exec, kitty
bind = $mainMod, E, exec, kitty -e yazi
bind = $mainMod, SPACE, exec, pkill rofi || rofi -show drun -replace -i

# Window Management
bind = $mainMod, Q, killactive
bind = $mainMod SHIFT, Q, exec, hyprctl activewindow | grep pid | tr -d 'pid:' | xargs kill
bind = $mainMod, F, fullscreen, 0
bind = $mainMod SHIFT, F, fullscreen, 1 # Maximize (Moved from M)
bind = $mainMod, T, togglefloating
bind = $mainMod, T, resizeactive, exact 1200 540
bind = $mainMod, T, moveactive, exact 360 100
bind = $mainMod, BACKSLASH, togglesplit # Moved from J due to Vim motions
bind = $mainMod SHIFT, BACKSLASH, swapsplit # Moved from K due to Vim motions
bind = $mainMod, G, togglegroup
bind = $mainMod, Tab, changegroupactive

# Vim Motions (Focus)
bind = $mainMod, H, movefocus, l
bind = $mainMod, L, movefocus, r
bind = $mainMod, K, movefocus, u
bind = $mainMod, J, movefocus, d

# Resizing
binde = $mainMod SHIFT, L, resizeactive, 100 0
binde = $mainMod SHIFT, H, resizeactive, -100 0
binde = $mainMod SHIFT, K, resizeactive, 0 -100
binde = $mainMod SHIFT, J, resizeactive, 0 100

# Custom Script Bindings (from dotfiles/scripts)
bind = $mainMod, B, exec, ~/.local/bin/custom/bt-connect-speaker.sh
bind = $mainMod, C, exec, ~/.local/bin/uv run ~/.local/bin/custom/rofi/code_project.py
bind = $mainMod SHIFT, S, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/screenshot_area.py swappy
bind = $mainMod CTRL, S, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/screenshot_area.py copy
bind = $mainMod SHIFT, T, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/screenshot_text.py
bind = $mainMod, P, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/screenshot_full.py
bind = $mainMod, D, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/specific_code_project.py ~/code/ember-data-processing
bind = $mainMod, PERIOD, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/emoji_picker.py
bind = $mainMod, ESCAPE, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/power.py
bind = $mainMod SHIFT, D, exec, ~/.local/bin/custom/rofi/port_opener.sh
bind = $mainMod, O, exec, sh -c "xdg-open \"$(wl-paste)\""
bind = $mainMod, M, exec, ~/.local/bin/custom/group.sh
# Actions from ML4W
bind = $mainMod CTRL, R, exec, hyprctl reload
bind = $mainMod, V, exec, ~/.local/bin/custom/cliphist.sh
bind = $mainMod SHIFT, B, exec, ~/.config/waybar/launch.sh
bind = $mainMod CTRL, B, exec, ~/.config/waybar/toggle.sh
bind = $mainMod CTRL, W, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/wallpaper.py local
bind = $mainMod SHIFT, W, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/wallpaper.py select
bind = $mainMod CTRL, T, exec, ~/.local/bin/uv run --script ~/.local/bin/custom/rofi/waybar_theme.py

# Workspaces
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Next/Previous Workspace
bind = $mainMod CTRL, Tab, workspace, m+1 # Moved from Tab
bind = $mainMod CTRL SHIFT, Tab, workspace, m-1

# Fn keys
bind = , XF86MonBrightnessUp, exec, brightnessctl -q s +10%
bind = , XF86MonBrightnessDown, exec, brightnessctl -q s 10%-
bindle=, XF86AudioRaiseVolume, exec, pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ +5%
bindle=, XF86AudioLowerVolume, exec, pactl set-sink-mute @DEFAULT_SINK@ 0 && pactl set-sink-volume @DEFAULT_SINK@ -5%
bind = , XF86AudioMute, exec, pactl set-sink-mute @DEFAULT_SINK@ toggle
bind = , XF86AudioPlay, exec, playerctl play-pause
bind = , XF86AudioNext, exec, playerctl next
bind = , XF86AudioPrev, exec, playerctl previous

# Mouse Bindings
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Layer Rules
layerrule = match:namespace selection, blur off
layerrule = match:namespace slurp, blur off

# General floating
windowrule = match:class (dotfiles-floating), float on
windowrule = match:class (dotfiles-floating), size 1000 700
windowrule = match:class (dotfiles-floating), center on
